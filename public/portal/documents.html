<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mes documents — INVITEFOCUS</title>
<link rel="stylesheet" href="/css/app-shell.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/api/env.js"></script>
<style>
  .intro { margin-bottom: var(--space-lg); }
  .intro p { color: var(--color-muted); margin-top: 4px; }

  .category-card { background: white; border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: var(--space-lg); margin-bottom: var(--space-md); }
  .category-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .category-head h2 { font-size: 1.05rem; margin: 0; }
  .category-required { font-size: 0.72rem; font-weight: 700; padding: 3px 10px; border-radius: 999px; }
  .category-required.required { background: #FFF4E5; color: var(--color-warning); }
  .category-required.optional { background: #F0F0F0; color: var(--color-muted); }
  .category-desc { font-size: 0.85rem; color: var(--color-muted); margin-bottom: var(--space-md); }

  .dropzone {
    border: 2px dashed var(--color-border); border-radius: var(--radius-md); padding: var(--space-lg); text-align: center;
    cursor: pointer; transition: border-color 150ms ease, background 150ms ease; margin-bottom: var(--space-sm); display: block;
  }
  .dropzone:hover, .dropzone.dragover { border-color: var(--color-primary); background: #F0F6FF; }
  .dropzone input { display: none; }
  .dropzone .label { font-size: 0.9rem; color: var(--color-text); font-weight: 600; }
  .dropzone .hint { font-size: 0.78rem; color: var(--color-muted); margin-top: 4px; }

  .file-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; background: var(--color-surface-alt); border-radius: var(--radius-md); margin-bottom: var(--space-sm); font-size: 0.88rem; }
  .file-row .name { display: flex; align-items: center; gap: var(--space-sm); overflow: hidden; }
  .file-row .name span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-row .status { font-size: 0.75rem; font-weight: 700; padding: 3px 10px; border-radius: 999px; flex-shrink: 0; }
  .file-row .status.uploading { background: #E8F0FB; color: var(--color-primary); }
  .file-row .status.done { background: #E8F8EF; color: var(--color-success); }
  .file-row .status.error { background: #FDEAEA; color: var(--color-danger); }
  .file-row .remove { background: none; border: none; color: var(--color-muted); cursor: pointer; font-size: 0.9rem; flex-shrink: 0; }
</style>
</head>
<body>

<div class="sidebar-backdrop" id="sidebarBackdrop"></div>
<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">INVITEFOCUS<span class="sub">Espace client</span></div>
    <ul class="sidebar-nav">
      <li><a href="/portal/dashboard.html"><span class="icon">⌂</span> Accueil</a></li>
      <li><a href="/portal/documents.html" class="active"><span class="icon">▤</span> Documents</a></li>
      <li><a href="/portal/messages.html"><span class="icon">✉</span> Messages</a></li>
      <li><a href="/portal/profile.html"><span class="icon">●</span> Mon profil</a></li>
    </ul>
    <div class="sidebar-footer"><button id="logoutBtn">Déconnexion</button></div>
  </aside>

  <div class="main-area">
    <div class="topbar">
      <button class="menu-toggle" id="menuToggle">☰</button>
      <h1>Documents</h1>
      <span></span>
    </div>
    <main class="content">
      <div class="intro">
        <p>Plus votre dossier est complet, plus le diagnostic sera précis. Formats acceptés : PDF, Excel, JPG, PNG (max 20 Mo par fichier).</p>
      </div>
      <div id="categories"></div>
      <div id="globalMsg" class="empty-state" style="display:none"></div>
    </main>
  </div>
</div>

<script src="/js/supabase-client.js"></script>
<script>
  document.getElementById('logoutBtn').addEventListener('click', signOut);
  document.getElementById('menuToggle').addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebarBackdrop').classList.toggle('open');
  });
  document.getElementById('sidebarBackdrop').addEventListener('click', () => {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarBackdrop').classList.remove('open');
  });

  const CATEGORIES = [
    { key: 'admin',          label: 'Documents administratifs', desc: 'NINEA, RCCM, statuts de la société', required: true },
    { key: 'bilan',          label: 'Bilan comptable',           desc: 'Dernier bilan disponible (Excel ou PDF)', required: true },
    { key: 'resultat',       label: 'Compte de résultat',        desc: 'Compte de résultat / P&L de l\'exercice', required: true },
    { key: 'facture_vente',  label: 'Factures de vente (entrées)', desc: 'Factures émises à vos clients', required: true },
    { key: 'facture_achat',  label: 'Factures d\'achat (sorties)', desc: 'Factures fournisseurs et dépenses', required: true },
    { key: 'releve_bancaire',label: 'Relevés bancaires',          desc: 'Relevés des 3 à 6 derniers mois', required: false },
    { key: 'autre',          label: 'Autres pièces',              desc: 'Tout autre document utile au diagnostic', required: false },
  ];

  let clientId = null;

  function fileIcon(name) {
    const ext = name.split('.').pop().toLowerCase();
    if (['xls', 'xlsx', 'csv'].includes(ext)) return '📊';
    if (['pdf'].includes(ext)) return '📄';
    if (['jpg', 'jpeg', 'png'].includes(ext)) return '🖼️';
    return '📎';
  }

  function renderCategories() {
    const container = document.getElementById('categories');
    container.innerHTML = CATEGORIES.map(cat => `
      <div class="category-card" data-cat="${cat.key}">
        <div class="category-head">
          <h2>${cat.label}</h2>
          <span class="category-required ${cat.required ? 'required' : 'optional'}">${cat.required ? 'Requis' : 'Optionnel'}</span>
        </div>
        <p class="category-desc">${cat.desc}</p>
        <label class="dropzone" data-cat="${cat.key}">
          <input type="file" multiple data-cat="${cat.key}" />
          <div class="label">Cliquez ou déposez vos fichiers ici</div>
          <div class="hint">PDF, Excel, JPG, PNG</div>
        </label>
        <div class="file-list" data-cat="${cat.key}"></div>
      </div>
    `).join('');

    document.querySelectorAll('.dropzone input').forEach(input => {
      input.addEventListener('change', (e) => handleFiles(e.target.dataset.cat, e.target.files));
    });
    document.querySelectorAll('.dropzone').forEach(zone => {
      zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('dragover'); });
      zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
      zone.addEventListener('drop', (e) => {
        e.preventDefault();
        zone.classList.remove('dragover');
        handleFiles(zone.dataset.cat, e.dataTransfer.files);
      });
    });
  }

  async function loadExistingDocs() {
    const { data: docs } = await sb
      .from('documents')
      .select('*')
      .eq('client_id', clientId)
      .order('created_at', { ascending: false });

    (docs || []).forEach(d => {
      const list = document.querySelector(`.file-list[data-cat="${d.type}"]`);
      if (!list) return;
      const row = document.createElement('div');
      row.className = 'file-row';
      row.innerHTML = `
        <div class="name">${fileIcon(d.file_name || '')}<span>${d.file_name}</span></div>
        <span class="status done">Reçu</span>
        <button class="remove" data-id="${d.id}" data-path="${d.storage_path || ''}">✕</button>
      `;
      list.appendChild(row);
    });

    document.querySelectorAll('.remove').forEach(btn => {
      btn.addEventListener('click', () => removeDocument(btn.dataset.id, btn.dataset.path, btn));
    });
  }

  async function removeDocument(docId, storagePath, btnEl) {
    if (storagePath) await sb.storage.from('documents').remove([storagePath]);
    await sb.from('documents').delete().eq('id', docId);
    btnEl.closest('.file-row').remove();
  }

  async function handleFiles(category, fileList) {
    const list = document.querySelector(`.file-list[data-cat="${category}"]`);
    for (const file of Array.from(fileList)) {
      if (file.size > 20 * 1024 * 1024) {
        alert(`"${file.name}" dépasse 20 Mo et n'a pas été envoyé.`);
        continue;
      }

      const row = document.createElement('div');
      row.className = 'file-row';
      row.innerHTML = `
        <div class="name">${fileIcon(file.name)}<span>${file.name}</span></div>
        <span class="status uploading">Envoi...</span>
      `;
      list.appendChild(row);

      const storagePath = `${clientId}/${category}/${Date.now()}_${file.name}`;

      const { error: uploadError } = await sb.storage.from('documents').upload(storagePath, file);

      if (uploadError) {
        row.querySelector('.status').className = 'status error';
        row.querySelector('.status').textContent = 'Erreur';
        continue;
      }

      const { error: insertError } = await sb.from('documents').insert({
        client_id: clientId,
        type: category,
        file_name: file.name,
        storage_path: storagePath,
        status: 'received',
      });

      if (insertError) {
        row.querySelector('.status').className = 'status error';
        row.querySelector('.status').textContent = 'Erreur';
        continue;
      }

      row.querySelector('.status').className = 'status done';
      row.querySelector('.status').textContent = 'Reçu';
    }
  }

  async function init() {
    const session = await requireAuth();
    if (!session) return;

    const { data: client, error } = await sb
      .from('clients')
      .select('id, status')
      .eq('user_id', session.user.id)
      .single();

    if (error || !client) {
      document.getElementById('categories').style.display = 'none';
      const msg = document.getElementById('globalMsg');
      msg.style.display = 'block';
      msg.textContent = 'Aucun dossier trouvé pour ce compte. Contactez votre consultant.';
      return;
    }

    clientId = client.id;
    renderCategories();
    await loadExistingDocs();

    if (client.status === 'lead' || client.status === 'onboarded') {
      await sb.from('clients').update({ status: 'collecting' }).eq('id', clientId);
    }
  }

  init();
</script>
</body>
</html>
