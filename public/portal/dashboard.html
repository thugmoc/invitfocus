<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mon espace — INVITEFOCUS</title>
<link rel="stylesheet" href="/css/app-shell.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/api/env.js"></script>
<style>
  .report-cta { display: flex; align-items: center; justify-content: space-between; gap: var(--space-lg); flex-wrap: wrap; }
  .doc-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--color-border); font-size: 0.9rem; }
  .doc-row:last-child { border-bottom: none; }
  .grid-2 { display: grid; grid-template-columns: 2fr 1fr; gap: var(--space-lg); }
  @media (max-width: 920px) { .grid-2 { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="sidebar-backdrop" id="sidebarBackdrop"></div>
<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">INVITEFOCUS<span class="sub">Espace client</span></div>
    <ul class="sidebar-nav">
      <li><a href="/portal/dashboard.html" class="active"><span class="icon">⌂</span> Accueil</a></li>
      <li><a href="/portal/documents.html"><span class="icon">▤</span> Documents</a></li>
      <li><a href="/portal/messages.html"><span class="icon">✉</span> Messages</a></li>
      <li><a href="/portal/profile.html"><span class="icon">●</span> Mon profil</a></li>
    </ul>
    <div class="sidebar-footer"><button id="logoutBtn">Déconnexion</button></div>
  </aside>

  <div class="main-area">
    <div class="topbar">
      <button class="menu-toggle" id="menuToggle">☰</button>
      <h1>Accueil</h1>
      <span></span>
    </div>
    <main class="content" id="loading">Chargement...</main>
  </div>
</div>

<script src="/js/supabase-client.js"></script>
<script>
  document.getElementById('logoutBtn').addEventListener('click', signOut);
  document.getElementById('menuToggle').addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebarBackdrop').classList.toggle('open');
  });
  document.getElementById('sidebarBackdrop').addEventListener('click', () => {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarBackdrop').classList.remove('open');
  });

  const STEPS = [
    { key: 'start', label: 'Inscription', statuses: ['lead', 'onboarded'] },
    { key: 'collect', label: 'Collecte', statuses: ['collecting', 'validating'] },
    { key: 'analyze', label: 'Analyse', statuses: ['analyzing'] },
    { key: 'done', label: 'Livré', statuses: ['delivered', 'feedback'] },
  ];

  function renderStepper(status) {
    const currentIdx = STEPS.findIndex(s => s.statuses.includes(status));
    return `<div class="stepper">${STEPS.map((s, i) => {
      let cls = '';
      if (i < currentIdx) cls = 'done';
      else if (i === currentIdx) cls = 'current';
      return `<div class="stepper-step ${cls}">
        <div class="stepper-dot">${i < currentIdx ? '✓' : i + 1}</div>
        <div class="stepper-label">${s.label}</div>
      </div>`;
    }).join('')}</div>`;
  }

  async function loadDashboard() {
    const session = await requireAuth();
    if (!session) return;

    const { data: client, error } = await sb
      .from('clients')
      .select('*, reports(*), documents(*)')
      .eq('user_id', session.user.id)
      .single();

    const main = document.getElementById('loading');
    main.id = '';

    if (error || !client) {
      main.innerHTML = '<div class="card"><p>Aucun dossier trouvé pour ce compte. Contactez votre consultant.</p></div>';
      return;
    }

    const docTypeLabels = {
      admin: 'Documents administratifs', bilan: 'Bilan comptable', resultat: 'Compte de résultat',
      facture_vente: 'Factures de vente', facture_achat: 'Factures d\'achat',
      releve_bancaire: 'Relevés bancaires', autre: 'Autres pièces',
    };

    const docsHtml = (client.documents || []).slice(0, 5).map(d => `
      <div class="doc-row">
        <span>${docTypeLabels[d.type] || d.type} — ${d.file_name || ''}</span>
        <span class="pill ${d.status === 'received' || d.status === 'verified' ? 'delivered' : 'collecting'}">
          ${d.status === 'received' || d.status === 'verified' ? 'Reçu' : 'En attente'}
        </span>
      </div>`).join('') || '<p style="color:var(--color-muted)">Aucun document encore.</p>';

    const latestReport = (client.reports || [])[0];

    main.innerHTML = `
      <div class="card" style="margin-bottom:var(--space-lg)">
        ${renderStepper(client.status)}
      </div>
      <div class="grid-2">
        <div>
          <div class="card" style="margin-bottom:var(--space-lg)">
            <h2 class="card-title">Bonjour ${client.name}</h2>
            <p style="color:var(--color-muted)">Entreprise : <strong>${client.company}</strong></p>
          </div>
          <div class="card">
            <h2 class="card-title">Documents récents</h2>
            ${docsHtml}
            <a class="btn btn-ghost" href="/portal/documents.html" style="margin-top:var(--space-md);display:inline-block">Gérer mes documents</a>
          </div>
        </div>
        <div class="card">
          <h2 class="card-title">Diagnostic financier</h2>
          ${latestReport ? `
            <p style="margin-bottom:var(--space-md);color:var(--color-muted)">Score global : <strong>${latestReport.score}/10</strong></p>
            <a class="btn btn-primary" href="${latestReport.pdf_url}" target="_blank" style="width:100%">Télécharger le rapport</a>
          ` : `<p style="color:var(--color-muted)">Votre rapport est en cours de préparation.</p>`}
        </div>
      </div>
    `;
  }

  loadDashboard();
</script>
</body>
</html>
