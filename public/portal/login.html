<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Connexion — INVITEFOCUS</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/api/env.js"></script>
<style>
  :root { --primary: #2E75B6; --bg: #F8FBFF; --text: #1A1A2E; --muted: #889098; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
         background: var(--bg); color: var(--text); min-height: 100vh;
         display: flex; align-items: center; justify-content: center; }
  .card { background: white; border-radius: 20px; padding: 40px; width: min(420px, 90%);
          box-shadow: 0 18px 48px rgba(46,117,182,0.12); }
  h1 { font-size: 1.5rem; margin-bottom: 8px; }
  p.subtitle { color: var(--muted); margin-bottom: 24px; font-size: 0.95rem; }
  label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; }
  input { width: 100%; padding: 12px 14px; border-radius: 10px; border: 1px solid #D8DFE5;
          margin-bottom: 16px; font-size: 1rem; }
  button { width: 100%; padding: 14px; border-radius: 10px; border: none; background: var(--primary);
           color: white; font-weight: 700; font-size: 1rem; cursor: pointer; }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  #msg { margin-top: 16px; font-size: 0.9rem; text-align: center; }
</style>
</head>
<body>
  <div class="card">
    <h1>Espace Client</h1>
    <p class="subtitle">Connectez-vous avec le lien magique envoyé par email.</p>
    <label for="email">Email</label>
    <input type="email" id="email" placeholder="vous@entreprise.com" />
    <button id="sendBtn">Recevoir le lien de connexion</button>
    <div id="msg"></div>
  </div>

<script src="/js/supabase-client.js"></script>
<script>
  const sendBtn = document.getElementById('sendBtn');
  const msg = document.getElementById('msg');

  sendBtn.addEventListener('click', async () => {
    const email = document.getElementById('email').value.trim();
    if (!email) { msg.textContent = 'Merci de saisir votre email.'; return; }

    sendBtn.disabled = true;
    sendBtn.textContent = 'Envoi...';

    const { error } = await sb.auth.signInWithOtp({
      email,
      options: { emailRedirectTo: window.location.origin + '/portal/dashboard.html' }
    });

    sendBtn.disabled = false;
    sendBtn.textContent = 'Recevoir le lien de connexion';

    msg.textContent = error
      ? 'Erreur : ' + error.message
      : 'Lien envoyé ! Vérifiez votre boîte mail.';
  });

  // Si déjà connecté, redirige direct
  getSession().then(session => {
    if (session) window.location.href = '/portal/dashboard.html';
  });
</script>
</body>
</html>
