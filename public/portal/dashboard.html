<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mon espace — INVITEFOCUS</title>
<link rel="stylesheet" href="/css/app-shell.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/api/env.js"></script>
<style>
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .action-plan { margin-bottom: var(--space-2xl); }
  .action-month {
    background: white; border: 1px solid var(--color-border); border-radius: var(--radius-lg);
    padding: var(--space-lg); margin-bottom: var(--space-md);
  }
  .action-month.current { border-left: 4px solid var(--color-primary); background: #F0F7FF; }
  .action-month h3 { margin-bottom: var(--space-sm); color: var(--color-primary); font-weight: 600; }
  .action-service { font-weight: 500; margin-bottom: var(--space-sm); }
  .action-tasks { list-style: none; padding-left: var(--space-md); }
  .action-tasks li { padding: 6px 0; font-size: 0.9rem; color: var(--color-muted); }
  .action-tasks li::before { content: "→ "; color: var(--color-primary); font-weight: 600; margin-right: 4px; }

  .service-status { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-lg); padding: var(--space-md); background: var(--color-surface-alt); border-radius: var(--radius-md); }
  .service-status-label { font-weight: 600; }
  .service-status-value { color: var(--color-muted); font-size: 0.9rem; }
  .service-status.active .service-status-value { color: var(--color-success); font-weight: 600; }

  .report-cta { display: flex; align-items: center; justify-content: space-between; gap: var(--space-lg); flex-wrap: wrap; }
  .doc-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--color-border); font-size: 0.9rem; }
  .doc-row:last-child { border-bottom: none; }
  .grid-2 { display: grid; grid-template-columns: 2fr 1fr; gap: var(--space-lg); }
  @media (max-width: 920px) { .grid-2 { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="sidebar-backdrop" id="sidebarBackdrop"></div>
<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">INVITEFOCUS<span class="sub">Espace client</span></div>
    <ul class="sidebar-nav">
      <li><a href="/portal/dashboard.html" class="active"><span class="icon">⌂</span> Accueil</a></li>
      <li><a href="/portal/documents.html"><span class="icon">▤</span> Documents</a></li>
      <li><a href="/portal/messages.html"><span class="icon">✉</span> Messages</a></li>
      <li><a href="/portal/profile.html"><span class="icon">●</span> Mon profil</a></li>
    </ul>
    <div class="sidebar-footer"><button id="logoutBtn">Déconnexion</button></div>
  </aside>

  <div class="main-area">
    <div class="topbar">
      <button class="menu-toggle" id="menuToggle">☰</button>
      <h1>Accueil</h1>
      <span></span>
    </div>
    <main class="content">
      <div style="display:flex;gap:var(--space-md);margin-bottom:var(--space-lg);flex-wrap:wrap">
        <button class="btn btn-ghost" data-tab="overview" style="flex:0;font-weight:600">Aperçu</button>
        <button class="btn btn-ghost" data-tab="comptable" style="flex:0;font-weight:600">◐ Comptable</button>
        <button class="btn btn-ghost" data-tab="juridique" style="flex:0;font-weight:600">⚖ Juridique</button>
        <button class="btn btn-ghost" data-tab="growth" style="flex:0;font-weight:600">◆ Growth</button>
      </div>

      <div id="tab-overview" class="tab-content active">
        <div id="actionPlanContainer" style="display:none"></div>
        <div id="welcomeContainer"></div>
      </div>

      <div id="tab-comptable" class="tab-content" style="display:none">
        <div class="card"><h2 class="card-title">Assistance Comptable</h2><div id="comptableContent"></div></div>
      </div>

      <div id="tab-juridique" class="tab-content" style="display:none">
        <div class="card"><h2 class="card-title">Services Juridiques</h2><div id="juridiqueContent"></div></div>
      </div>

      <div id="tab-growth" class="tab-content" style="display:none">
        <div class="card"><h2 class="card-title">Stratégie & Growth</h2><div id="growthContent"></div></div>
      </div>
    </main>
  </div>
</div>

<script src="/js/supabase-client.js"></script>
<script>
  let currentClient = null;

  document.getElementById('logoutBtn').addEventListener('click', signOut);
  document.getElementById('menuToggle').addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebarBackdrop').classList.toggle('open');
  });
  document.getElementById('sidebarBackdrop').addEventListener('click', () => {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarBackdrop').classList.remove('open');
  });

  // Tab navigation
  document.querySelectorAll('[data-tab]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const tabName = e.target.dataset.tab;
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.getElementById('tab-' + tabName).classList.add('active');
      document.querySelectorAll('[data-tab]').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
    });
  });

  async function renderActionPlan(client) {
    const actionPlan = `
      <div class="card" style="margin-bottom:var(--space-2xl)">
        <h2 class="card-title">Votre plan d'action sur 12 mois</h2>
        <p style="color:var(--color-muted);margin-bottom:var(--space-lg)">Basé sur votre diagnostic, voici comment structurer vos trois enjeux critiques, mois par mois.</p>
        <div class="action-plan">
          <div class="action-month ${client.status === 'onboarded' || client.status === 'collecting' ? 'current' : ''}">
            <div style="display:flex;justify-content:space-between">
              <div>
                <h3>Mois 1-2 : Formalisation</h3>
                <div class="action-service">⚖ Services Juridiques</div>
              </div>
              <span class="pill ${client.status === 'onboarded' || client.status === 'collecting' ? 'current' : 'upcoming'}" style="height:fit-content">
                ${client.status === 'onboarded' || client.status === 'collecting' ? 'En cours' : 'À venir'}
              </span>
            </div>
            <ul class="action-tasks">
              <li>Formalisation de votre structure légale</li>
              <li>Numérotation et enregistrement fiscal</li>
              <li>Première conformité contractuelle</li>
            </ul>
          </div>

          <div class="action-month ${client.status === 'validating' || client.status === 'analyzing' ? 'current' : ''}">
            <div style="display:flex;justify-content:space-between">
              <div>
                <h3>Mois 3-6 : Comptabilité structurée</h3>
                <div class="action-service">◐ Assistance Comptable</div>
              </div>
              <span class="pill ${client.status === 'validating' || client.status === 'analyzing' ? 'current' : 'upcoming'}" style="height:fit-content">
                ${client.status === 'validating' || client.status === 'analyzing' ? 'En cours' : 'À venir'}
              </span>
            </div>
            <ul class="action-tasks">
              <li>Classement et saisie comptable rétrospective</li>
              <li>Mise en place de la trésorerie automatisée</li>
              <li>États financiers mensuels validés</li>
            </ul>
          </div>

          <div class="action-month ${client.status === 'delivered' || client.status === 'feedback' ? 'current' : ''}">
            <div style="display:flex;justify-content:space-between">
              <div>
                <h3>Mois 7-12 : Croissance pilotée</h3>
                <div class="action-service">◆ Stratégie & Growth</div>
              </div>
              <span class="pill ${client.status === 'delivered' || client.status === 'feedback' ? 'current' : 'upcoming'}" style="height:fit-content">
                ${client.status === 'delivered' || client.status === 'feedback' ? 'En cours' : 'À venir'}
              </span>
            </div>
            <ul class="action-tasks">
              <li>Business plan actualisé avec nouvelles données</li>
              <li>Identification des leviers de croissance</li>
              <li>Préparation pour levée de fonds ou expansion</li>
            </ul>
          </div>
        </div>
      </div>
    `;
    return actionPlan;
  }

  async function renderServiceTab(serviceName, client) {
    const serviceStatus = {
      comptable: { active: ['validating', 'analyzing', 'delivered'], status: 'Assistance Comptable' },
      juridique: { active: ['onboarded', 'collecting', 'validating'], status: 'Services Juridiques' },
      growth: { active: ['delivered', 'feedback'], status: 'Stratégie & Growth' }
    }[serviceName];

    const isActive = serviceStatus.active.includes(client.status);

    return `
      <div class="service-status ${isActive ? 'active' : ''}">
        <span class="service-status-label">${serviceStatus.status}</span>
        <span class="service-status-value">${isActive ? 'Actif' : 'Planifié'}</span>
      </div>
      <p style="color:var(--color-muted);margin-bottom:var(--space-lg)">
        ${serviceName === 'comptable' ? 'Classement comptable, suivi de trésorerie, états financiers et conformité fiscale.' :
          serviceName === 'juridique' ? 'Formalisation, création, conformité légale et contrats.' :
          'Business plan, conseil stratégique et identification des leviers de croissance.'}
      </p>
      <div style="padding:var(--space-lg);background:var(--color-surface-alt);border-radius:var(--radius-md)">
        <p style="color:var(--color-muted);font-size:0.9rem">Nous vous tiendrons à jour ici avec les tâches et documents spécifiques au fil de la progression.</p>
      </div>
    `;
  }

  async function loadDashboard() {
    const session = await requireAuth();
    if (!session) return;

    const { data: client, error } = await sb
      .from('clients')
      .select('*, reports(*), documents(*)')
      .eq('user_id', session.user.id)
      .single();

    if (error || !client) {
      document.querySelector('main').innerHTML = '<div class="card"><p>Aucun dossier trouvé pour ce compte. Contactez votre consultant.</p></div>';
      return;
    }

    currentClient = client;

    // Aperçu tab
    const docTypeLabels = {
      admin: 'Documents administratifs', bilan: 'Bilan comptable', resultat: 'Compte de résultat',
      facture_vente: 'Factures de vente', facture_achat: 'Factures d\'achat',
      releve_bancaire: 'Relevés bancaires', autre: 'Autres pièces',
    };

    const docsHtml = (client.documents || []).slice(0, 3).map(d => `
      <div class="doc-row">
        <span>${docTypeLabels[d.type] || d.type}</span>
        <span class="pill ${d.status === 'received' || d.status === 'verified' ? 'delivered' : 'collecting'}">
          ${d.status === 'received' || d.status === 'verified' ? 'Reçu' : 'En attente'}
        </span>
      </div>`).join('') || '<p style="color:var(--color-muted)">Aucun document encore.</p>';

    const latestReport = (client.reports || [])[0];

    const actionPlanHtml = await renderActionPlan(client);
    document.getElementById('actionPlanContainer').innerHTML = actionPlanHtml;
    document.getElementById('actionPlanContainer').style.display = 'block';

    document.getElementById('welcomeContainer').innerHTML = `
      <div class="grid-2">
        <div>
          <div class="card" style="margin-bottom:var(--space-lg)">
            <h2 class="card-title">Bonjour ${client.name}</h2>
            <p style="color:var(--color-muted);margin-bottom:var(--space-md)"><strong>${client.company}</strong></p>
            <a class="btn btn-ghost" href="/portal/documents.html" style="display:inline-block">Gérer mes documents →</a>
          </div>
        </div>
        <div class="card">
          <h2 class="card-title">Diagnostic</h2>
          ${latestReport ? `
            <p style="margin-bottom:var(--space-md);color:var(--color-muted)">Score : <strong>${latestReport.score || '—'}/10</strong></p>
            <a class="btn btn-primary" href="${latestReport.pdf_url}" target="_blank" style="width:100%">Télécharger le rapport</a>
          ` : `<p style="color:var(--color-muted)">Votre rapport est en cours de préparation.</p>`}
        </div>
      </div>
    `;

    // Service tabs
    document.getElementById('comptableContent').innerHTML = await renderServiceTab('comptable', client);
    document.getElementById('juridiqueContent').innerHTML = await renderServiceTab('juridique', client);
    document.getElementById('growthContent').innerHTML = await renderServiceTab('growth', client);
  }

  loadDashboard();
</script>
</body>
</html>
